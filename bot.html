<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Загрузка бота...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b14; }
        #bot-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #bot-loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0b0b14;
            color: #a29bfe;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 10;
            transition: opacity 0.3s;
        }
        #bot-loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 48px; height: 48px;
            border: 4px solid rgba(108,92,231,0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 0.95rem; opacity: 0.8; }
        #bot-error {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0b0b14;
            color: #e74c3c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 20;
        }
        #bot-error.visible { display: flex; }
        .error-icon { font-size: 3rem; margin-bottom: 12px; }
        .error-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .error-text { font-size: 0.9rem; opacity: 0.8; color: #a0a0b8; text-align: center; max-width: 300px; line-height: 1.5; }
        .error-back {
            margin-top: 20px;
            padding: 10px 24px;
            border: 1px solid rgba(108,92,231,0.3);
            background: rgba(108,92,231,0.1);
            color: #a29bfe;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        .error-back:hover { background: rgba(108,92,231,0.2); }
    </style>
</head>
<body>

<div id="bot-loading">
    <div class="loader"></div>
    <div class="loader-text">Загрузка бота...</div>
</div>

<div id="bot-error">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Бот не найден</div>
    <div class="error-text" id="error-detail">Возможно, бот был удалён или ссылка недействительна.</div>
    <button class="error-back" onclick="history.back()">← Назад</button>
</div>

<iframe id="bot-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" style="display:none"></iframe>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
(function() {
    // Firebase config
    var firebaseConfig = {
        apiKey: "AIzaSyA8s8DkKq7rXN6MqgEsra9uGfF1lm0FuVM",
        authDomain: "twiin-3e745.firebaseapp.com",
        databaseURL: "https://twiin-3e745-default-rtdb.firebaseio.com",
        projectId: "twiin-3e745",
        storageBucket: "twiin-3e745.firebasestorage.app",
        messagingSenderId: "651448638115",
        appId: "1:651448638115:web:206ec02b69ce35d5303d16"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // Получаем ID бота из URL
    var params = new URLSearchParams(window.location.search);
    var botId = params.get('id');

    if (!botId) {
        showError('Не указан ID бота в ссылке.');
        return;
    }

    // Загружаем бота из Firebase
    var botRef = db.ref('bots/' + botId);
    botRef.once('value').then(function(snap) {
        if (!snap.exists()) {
            showError('Бот с таким ID не найден. Возможно, он был удалён.');
            return;
        }

        var bot = snap.val();

        // Увеличиваем счётчик просмотров
        botRef.update({ views: (bot.views || 0) + 1 }).catch(function(){});

        // Устанавливаем заголовок
        document.title = (bot.name || 'Бот') + ' — Twiin Bot';

        // Получаем HTML-код бота
        var htmlCode = bot.htmlCode || '';

        if (!htmlCode.trim()) {
            showError('У бота нет кода для отображения.');
            return;
        }

        // Рендерим в iframe через srcdoc
        var frame = document.getElementById('bot-frame');
        var loading = document.getElementById('bot-loading');

        frame.srcdoc = htmlCode;
        frame.style.display = 'block';

        // Скрываем загрузку когда iframe загрузится
        frame.onload = function() {
            loading.classList.add('hidden');
            setTimeout(function() { loading.style.display = 'none'; }, 350);
        };

        // Fallback — если iframe не вызвал onload
        setTimeout(function() {
            if (!loading.classList.contains('hidden')) {
                loading.classList.add('hidden');
                setTimeout(function() { loading.style.display = 'none'; }, 350);
            }
        }, 4000);

    }).catch(function(err) {
        showError('Ошибка загрузки: ' + (err.message || 'проверьте соединение'));
    });

    function showError(msg) {
        var loading = document.getElementById('bot-loading');
        var error = document.getElementById('bot-error');
        var detail = document.getElementById('error-detail');

        loading.style.display = 'none';
        if (detail) detail.textContent = msg;
        error.classList.add('visible');
    }
})();
</script>
</body>
</html>
